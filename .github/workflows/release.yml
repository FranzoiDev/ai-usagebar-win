name: release

# Builds the unpackaged, self-contained WinUI app and publishes it to a GitHub
# Release whenever you push a version tag, e.g.  git tag v0.3.0 && git push origin v0.3.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish (win-x64, self-contained, unpackaged)
        run: >
          dotnet publish AiUsageBar/AiUsageBar.csproj
          -c Release
          -p:Platform=x64
          -r win-x64
          --self-contained true
          -p:WindowsPackageType=None
          -p:WindowsAppSDKSelfContained=true
          -o publish

      - name: Stage artifacts
        shell: pwsh
        run: |
          Copy-Item README.md publish/
          Copy-Item config.example.toml publish/
          Compress-Archive -Path publish/* `
            -DestinationPath "ai-usagebar-win-${{ github.ref_name }}-x64-windows.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ai-usagebar-win-${{ github.ref_name }}-x64-windows.zip
