name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore AiUsageBar.sln

      - name: Build
        run: dotnet build AiUsageBar.sln -c Release -p:Platform=x64 --no-restore

      - name: Test
        run: dotnet test AiUsageBar.Tests/AiUsageBar.Tests.csproj -c Release -p:Platform=x64 --no-build
